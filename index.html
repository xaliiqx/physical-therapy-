<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>منصة الامتحانات الإلكترونية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700&display=swap');

  :root{
    --bg:#120f2b;
    --bg2:#1c1750;
    --card:#211c4d;
    --card-2:#2a2460;
    --primary:#ff6f5e;
    --primary-2:#ffc247;
    --text:#f5f3ff;
    --text-dim:#b3ade0;
    --line: rgba(255,255,255,0.1);
    --good:#4ade80;
    --bad:#f87171;
    --white:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Tajawal', sans-serif;
    background:
      radial-gradient(circle at 85% -10%, rgba(255,111,94,0.25), transparent 45%),
      radial-gradient(circle at -10% 110%, rgba(255,194,71,0.15), transparent 45%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    background-attachment: fixed;
    color:var(--text);
    min-height:100vh;
  }
  .display{font-family:'Cairo', sans-serif;}

  header.top{
    background: rgba(18,15,43,0.7);
    backdrop-filter: blur(10px);
    color: var(--text);
    padding: 16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index:50;
  }
  header.top .brand{display:flex; align-items:center; gap:12px;}
  .brand-3d{ perspective:400px; }
  .brand-3d .mark{
    width:42px;height:42px;border-radius:12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display:flex; align-items:center; justify-content:center; font-family:'Cairo'; font-weight:900; color:#1a1330; font-size:1.05rem;
    transform-style:preserve-3d;
    box-shadow: 0 3px 0 rgba(0,0,0,.35), 0 8px 18px rgba(255,111,94,.4);
    animation: markFloat 3.6s ease-in-out infinite;
  }
  @keyframes markFloat{
    0%,100%{ transform: translateY(0) rotateY(0deg) rotateX(0deg); }
    25%{ transform: translateY(-3px) rotateY(90deg) rotateX(4deg); }
    50%{ transform: translateY(-5px) rotateY(180deg) rotateX(0deg); }
    75%{ transform: translateY(-3px) rotateY(270deg) rotateX(-4deg); }
  }
  header.top h1{font-size:1.05rem; margin:0; font-family:'Cairo'; font-weight:800; letter-spacing:.2px;}
  header.top .sub{font-size:.72rem; color:var(--text-dim); margin-top:2px;}
  header.top .credit{font-size:.6rem; color:var(--primary-2); letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-top:1px; opacity:.85;}
  .top-actions button{
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:8px 14px; border-radius:8px; font-family:'Tajawal'; font-size:.85rem; cursor:pointer;
  }
  .top-actions button:hover{background:rgba(255,255,255,.08);}
  .top-actions{display:flex; align-items:center; gap:8px;}
  #telegramHeaderBtn{
    background: linear-gradient(120deg, var(--primary), var(--primary-2)) !important;
    color:#1a1330 !important; font-weight:800 !important; border:none !important;
  }
  #telegramHeaderBtn:hover{ filter:brightness(1.08); }

  .wrap{max-width:960px; margin:0 auto; padding:26px 18px 60px;}

  /* Home */
  .home-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:30px;}
  @media(max-width:700px){.home-grid{grid-template-columns:1fr;}}
  .home-card{
    background: linear-gradient(155deg, var(--card), var(--card-2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:32px 24px;
    text-align:center;
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s;
    position:relative;
    overflow:hidden;
  }
  .home-card:hover{transform:translateY(-4px); box-shadow:0 16px 34px rgba(0,0,0,.35); border-color: var(--primary);}
  .home-card::after{
    content:''; position:absolute; inset:0; opacity:0; transition:.2s;
    background: radial-gradient(circle at 50% 0%, rgba(255,111,94,0.18), transparent 60%);
  }
  .home-card:hover::after{opacity:1;}
  .home-card .icon{font-size:2.4rem; margin-bottom:12px; display:block;}
  .home-card h2{font-family:'Cairo'; font-size:1.3rem; margin:6px 0 8px; font-weight:800;}
  .home-card p{color:var(--text-dim); font-size:.9rem; line-height:1.7; margin:0;}

  .hero{text-align:center; padding-top:10px;}
  .hero .eyebrow{
    font-family:'Cairo'; letter-spacing:3px; font-size:.72rem; color:var(--primary-2);
    text-transform:uppercase; font-weight:800;
  }
  .hero h1{font-family:'Cairo'; font-size:2.2rem; margin:10px 0 6px; font-weight:900;
    background: linear-gradient(90deg, var(--text), var(--primary-2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .hero p{color:var(--text-dim); max-width:520px; margin:0 auto;}

  .panel{
    background: linear-gradient(160deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:14px; padding:22px;
    margin-bottom:18px;
  }
  .panel h3{font-family:'Cairo'; margin-top:0; font-size:1.05rem; border-bottom:1px solid var(--line); padding-bottom:12px; font-weight:800;}

  label{display:block; font-size:.85rem; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
  input[type=text], input[type=password], input[type=number], input[type=datetime-local], textarea, select{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px;
    font-family:'Tajawal'; font-size:.95rem; background:rgba(0,0,0,0.2); color:var(--text);
    margin-bottom:14px;
  }
  input::placeholder, textarea::placeholder{color:var(--text-dim); opacity:.7;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--primary); outline-offset:1px;}
  textarea{resize:vertical; min-height:80px;}
  input[type=color]{width:56px; height:40px; padding:2px; border-radius:8px; cursor:pointer; margin-bottom:6px;}

  .btn{
    display:inline-block; font-family:'Tajawal'; font-weight:700; font-size:.92rem;
    padding:12px 24px; border-radius:9px; border:none; cursor:pointer; transition:.15s;
  }
  .btn-primary{background: linear-gradient(120deg, var(--primary), var(--primary-2)); color:#1a1330; font-weight:800;}
  .btn-primary:hover{filter:brightness(1.08); transform:translateY(-1px);}
  .btn-outline{background:transparent; border:1px solid var(--line); color:var(--text);}
  .btn-outline:hover{background:rgba(255,255,255,.08);}
  .btn-danger{background:transparent; border:1px solid var(--bad); color:var(--bad);}
  .btn-danger:hover{background:var(--bad); color:white;}
  .btn-sm{padding:7px 14px; font-size:.8rem;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:150px;}

  .tabs{display:flex; gap:4px; margin-bottom:18px; border-bottom:1px solid var(--line); flex-wrap:wrap; overflow-x:auto;}
  .tab{
    padding:10px 14px; cursor:pointer; font-family:'Cairo'; font-weight:700; font-size:.85rem;
    color:var(--text-dim); border-bottom:3px solid transparent; margin-bottom:-1px; white-space:nowrap;
  }
  .tab.active{color:var(--text); border-bottom-color:var(--primary);}

  table{width:100%; border-collapse:collapse; font-size:.85rem;}
  th, td{padding:10px 8px; text-align:right; border-bottom:1px solid var(--line);}
  th{font-family:'Cairo'; color:var(--text-dim); font-weight:700; font-size:.78rem;}
  tr:hover td{background:rgba(255,255,255,.03);}

  .code-chip{
    display:inline-flex; align-items:center; gap:8px; font-family:'Cairo'; font-weight:800; letter-spacing:3px;
    background: rgba(0,0,0,.25); border:1px solid var(--line); color:var(--primary-2); padding:8px 14px; border-radius:8px; font-size:1rem;
  }
  .icon-btn{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:.95rem; padding:2px;}
  .icon-btn:hover{color:var(--text);}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:.7rem; font-weight:700;}
  .badge-active{background:rgba(74,222,128,.15); color:var(--good);}
  .badge-inactive{background:rgba(248,113,113,.15); color:var(--bad);}
  .badge-pending{background:rgba(255,194,71,.15); color:var(--primary-2);}

  .exam-card{
    background: linear-gradient(160deg, var(--card), var(--card-2));
    border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:14px;
  }
  .exam-card-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
  .exam-card-head h3{margin:0; font-size:1.05rem; font-family:'Cairo'; font-weight:800;}
  .exam-meta-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
  @media(min-width:560px){ .exam-meta-grid{grid-template-columns:repeat(4,1fr);} }
  .exam-meta-grid .meta-item{background:rgba(0,0,0,.18); border-radius:8px; padding:9px 10px; overflow:hidden;}
  .exam-meta-grid .meta-label{display:block; font-size:.66rem; color:var(--text-dim); margin-bottom:4px;}
  .exam-meta-grid .meta-value{font-size:.82rem; font-weight:700; word-break:break-word;}
  .exam-actions{display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:12px;}

  .qcard{
    background: rgba(0,0,0,.18); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px;
    position:relative;
  }
  .qcard .qnum{
    position:absolute; top:-11px; right:14px; background: linear-gradient(120deg, var(--primary), var(--primary-2)); color:#1a1330; font-family:'Cairo'; font-weight:800;
    font-size:.72rem; padding:3px 12px; border-radius:20px;
  }
  .opt-row{display:flex; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background:rgba(0,0,0,.15); cursor:pointer; transition:.15s;}
  .opt-row:hover{border-color:var(--primary);}
  .opt-row input{width:auto; margin:0;}
  .opt-row.selected{border-color:var(--primary); background:rgba(255,111,94,.12);}
  .opt-row.correct{border-color:var(--good); background:rgba(74,222,128,.12);}
  .opt-row.wrong{border-color:var(--bad); background:rgba(248,113,113,.12);}

  .timer-bar{
    position:sticky; top:70px; z-index:40; background: rgba(0,0,0,.35); backdrop-filter: blur(8px); color:var(--primary-2); border:1px solid var(--line);
    padding:12px 16px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;
    font-family:'Cairo'; font-weight:800; margin-bottom:16px;
  }
  .timer-bar.warn{color:var(--bad);}

  .empty{text-align:center; padding:40px 20px; color:var(--text-dim);}
  .empty .icon{font-size:2rem; opacity:.6; margin-bottom:8px;}

  .msg{padding:12px 14px; border-radius:8px; margin-bottom:14px; font-size:.88rem; font-weight:600;}
  .msg-error{background:rgba(248,113,113,.12); color:var(--bad); border:1px solid rgba(248,113,113,.3);}
  .msg-success{background:rgba(74,222,128,.12); color:var(--good); border:1px solid rgba(74,222,128,.3);}

  .q-list-add{
    border:2px dashed var(--line); border-radius:12px; padding:16px; text-align:center; color:var(--text-dim);
    cursor:pointer; margin-bottom:16px; font-weight:700; font-family:'Cairo';
  }
  .q-list-add:hover{border-color:var(--primary); color:var(--primary-2);}

  .link-btn{background:none; border:none; color:var(--primary-2); text-decoration:underline; cursor:pointer; font-family:'Tajawal'; font-size:.85rem; padding:0;}

  .back-btn{background:none; border:none; color:var(--text-dim); cursor:pointer; font-family:'Tajawal'; font-size:.85rem; margin-bottom:14px; display:inline-flex; align-items:center; gap:4px;}
  .back-btn:hover{color:var(--text);}

  .footer-note{text-align:center; color:var(--text-dim); font-size:.78rem; margin-top:30px;}

  .score-big{font-family:'Cairo'; font-size:2.8rem; font-weight:900;
    background: linear-gradient(90deg, var(--primary-2), var(--primary));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .score-sub{color:var(--text-dim); font-size:.9rem;}

  .loading{text-align:center; padding:60px 20px; color:var(--text-dim);}
  .spinner{
    width:28px; height:28px; border:3px solid var(--line); border-top-color:var(--primary);
    border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Wisdom / quote card */
  .quote-card{
    position:relative; border-radius:14px; padding:20px 22px; margin:18px 0;
    background: linear-gradient(120deg, rgba(255,111,94,.12), rgba(255,194,71,.08));
    border:1px solid rgba(255,194,71,.35);
    overflow:hidden;
  }
  .quote-card .qmark{position:absolute; top:-6px; right:14px; font-size:3rem; font-family:'Cairo'; color:rgba(255,194,71,.25); font-weight:900;}
  .quote-card p{margin:0; font-family:'Cairo'; font-weight:700; font-size:1.02rem; line-height:1.8; color:var(--text);}
  .quote-card .tag{margin-top:8px; font-size:.72rem; color:var(--primary-2); font-weight:700;}

  .telegram-strip{
    display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;
    background: rgba(0,0,0,.2); border:1px solid var(--line); border-radius:10px; padding:10px 16px;
    color:var(--text); font-size:.85rem; font-weight:700; margin-top:16px;
  }
  .telegram-strip:hover{border-color:var(--primary);}

  .swatch-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
  .swatch{
    width:70px; border-radius:10px; overflow:hidden; cursor:pointer; border:2px solid var(--line); text-align:center;
  }
  .swatch:hover{border-color:var(--primary);}
  .swatch .bar{height:36px;}
  .swatch span{display:block; font-size:.62rem; padding:4px 0; color:var(--text-dim);}

  .teacher-card{
    position:relative; display:flex; align-items:center; gap:22px;
    border-radius:18px; padding:26px 24px; margin:26px 0;
    background: linear-gradient(135deg, rgba(139,124,246,.14), rgba(76,224,210,.08));
    border:1px solid rgba(139,124,246,.4);
    overflow:hidden;
  }
  .teacher-card::before{
    content:''; position:absolute; inset:0; opacity:.5;
    background: radial-gradient(circle at 90% 10%, rgba(76,224,210,.18), transparent 55%);
  }
  @media(max-width:640px){ .teacher-card{flex-direction:column; text-align:center;} }
  .atom{position:relative; width:80px; height:80px; flex-shrink:0;}
  .atom .core{
    position:absolute; top:50%; left:50%; width:16px; height:16px; margin:-8px 0 0 -8px;
    border-radius:50%; background: linear-gradient(135deg, var(--primary), var(--primary-2));
    box-shadow:0 0 16px var(--primary); z-index:2;
  }
  .atom .orbit-wrap{position:absolute; inset:0;}
  .atom .orbit{
    position:absolute; inset:0; border:1.5px solid rgba(255,255,255,.32); border-radius:50%;
    animation: spinOrbit 3.4s linear infinite;
  }
  .atom .orbit-wrap:nth-child(3) .orbit{ animation-duration:4.6s; animation-direction:reverse; }
  .atom .orbit-wrap:nth-child(4) .orbit{ animation-duration:5.8s; }
  .atom .orbit span{
    position:absolute; top:-4px; left:50%; width:7px; height:7px; margin-left:-3.5px;
    border-radius:50%; background: var(--primary-2); box-shadow:0 0 8px var(--primary-2);
  }
  @keyframes spinOrbit{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .teacher-tag{
    display:inline-block; font-size:.7rem; font-weight:800; letter-spacing:1px;
    background: rgba(76,224,210,.15); color:#4ce0d2; padding:4px 12px; border-radius:20px; margin-bottom:8px;
  }
  .teacher-card h3{margin:2px 0 6px; font-size:1.25rem; font-weight:900;}
  .teacher-card p{margin:0; color:var(--text-dim); font-size:.86rem; line-height:1.8; max-width:480px;}

  .celebrate{position:relative;}
  .celebrate .spark{position:absolute; font-size:1.4rem; animation:pop 1.6s ease-out forwards;}
  @keyframes pop{
    0%{transform:translateY(0) scale(0); opacity:1;}
    60%{transform:translateY(-40px) scale(1.2); opacity:1;}
    100%{transform:translateY(-70px) scale(.8); opacity:0;}
  }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBQv_C5K1tb26nIRSgIi9kHA9LdUOt2AVA",
    authDomain: "physical-964de.firebaseapp.com",
    projectId: "physical-964de",
    storageBucket: "physical-964de.firebasestorage.app",
    messagingSenderId: "646270551797",
    appId: "1:646270551797:web:bc82728147d3d17757e7bc"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const FS_COLLECTION = 'examAppData';

  // يحاكي هذا الكائن نفس واجهة window.storage الأصلية، لذا لا حاجة لتغيير أي شيء آخر بالتطبيق.
  window.storage = {
    async get(key, shared){
      const snap = await db.collection(FS_COLLECTION).doc(key).get();
      if(!snap.exists) throw new Error('key-not-found: ' + key);
      return { key, value: snap.data().value, shared: !!shared };
    },
    async set(key, value, shared){
      await db.collection(FS_COLLECTION).doc(key).set({ value, updatedAt: Date.now() });
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      await db.collection(FS_COLLECTION).doc(key).delete();
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const snaps = await db.collection(FS_COLLECTION).get();
      const keys = [];
      snaps.forEach(d => { if(!prefix || d.id.startsWith(prefix)) keys.push(d.id); });
      return { keys, prefix, shared: !!shared };
    }
  };
</script>

<script>
/* ============================= STORAGE HELPERS ============================= */
async function loadExams(){
  try{ const r = await window.storage.get('exams-list', true); return r ? JSON.parse(r.value) : []; }catch(e){ return []; }
}
async function saveExams(list){ await window.storage.set('exams-list', JSON.stringify(list), true); }
async function loadSubs(){
  try{ const r = await window.storage.get('submissions-list', true); return r ? JSON.parse(r.value) : []; }catch(e){ return []; }
}
async function saveSubs(list){ await window.storage.set('submissions-list', JSON.stringify(list), true); }
async function loadAdminPass(){
  try{ const r = await window.storage.get('admin-settings', true); return r ? JSON.parse(r.value).password : 'admin123'; }catch(e){ return 'admin123'; }
}
async function saveAdminPass(pw){
  const tg = await loadTelegramLink();
  await window.storage.set('admin-settings', JSON.stringify({password: pw, telegram: tg}), true);
}
async function loadTelegramLink(){
  try{ const r = await window.storage.get('admin-settings', true); return r ? (JSON.parse(r.value).telegram || '') : ''; }catch(e){ return ''; }
}
async function saveTelegramLink(link){
  const pw = await loadAdminPass();
  await window.storage.set('admin-settings', JSON.stringify({password: pw, telegram: link}), true);
}

const GRADE_KEYS = ['grade1','grade2','grade3','grade4','grade5','grade6'];
const GRADE_LABELS = {
  grade1:'الأول متوسط', grade2:'الثاني متوسط', grade3:'الثالث متوسط',
  grade4:'الرابع العلمي', grade5:'الخامس العلمي', grade6:'السادس العلمي'
};
async function loadGradeChapters(gradeKey){
  try{ const r = await window.storage.get('grade-content:'+gradeKey, true); return r ? JSON.parse(r.value) : []; }
  catch(e){ return []; }
}
async function saveGradeChapters(gradeKey, chapters){
  await window.storage.set('grade-content:'+gradeKey, JSON.stringify(chapters), true);
}
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}
async function loadStudents(){
  try{ const r = await window.storage.get('students-list', true); return r ? JSON.parse(r.value) : []; }
  catch(e){ return []; }
}
async function saveStudents(list){ await window.storage.set('students-list', JSON.stringify(list), true); }
async function checkStorageHealth(){
  try{
    if(!window.storage) return { ok:false, error:'window.storage غير معرّف' };
    const testVal = 'ok-' + Date.now();
    await window.storage.set('healthcheck', testVal, false);
    const r = await window.storage.get('healthcheck', false);
    if(r && r.value === testVal) return { ok:true, error:null };
    return { ok:false, error:'تم الاتصال لكن التحقق من القراءة فشل' };
  }catch(e){ return { ok:false, error: (e && e.message) ? e.message : String(e) }; }
}

function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = ''; for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function genId(){ return 'id' + Date.now() + Math.floor(Math.random()*10000); }
function escapeHtml(s){
  if(s===undefined || s===null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function isExamUsable(exam){
  if(!exam.active) return {ok:false, reason:'هذا الامتحان موقوف حاليًا من قبل المدرّس'};
  if(exam.expiresAt){
    const exp = new Date(exam.expiresAt).getTime();
    if(!isNaN(exp) && Date.now() > exp) return {ok:false, reason:'انتهت صلاحية رمز هذا الامتحان'};
  }
  return {ok:true};
}
function suggestScore(studentAnswer, modelAnswer, maxPoints){
  if(!modelAnswer || !modelAnswer.trim()) return null;
  const norm = s => (s||'').toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟،؛"'\n]/g,' ').split(/\s+/).filter(w=>w.length>1);
  const a = new Set(norm(studentAnswer));
  const b = norm(modelAnswer);
  if(b.length===0) return null;
  let matched = 0;
  const bSet = new Set(b);
  bSet.forEach(w => { if(a.has(w)) matched++; });
  const ratio = matched / bSet.size;
  return Math.round(ratio * maxPoints);
}

async function saveDraftExam(event){
  const msgEl = document.getElementById('createMsg');
  if(!draftExam.title.trim()){ msgEl.innerHTML = `<div class="msg msg-error">الرجاء إدخال عنوان الامتحان</div>`; return; }
  if(draftExam.questions.length===0){ msgEl.innerHTML = `<div class="msg msg-error">أضف سؤالًا واحدًا على الأقل</div>`; return; }
  for(const q of draftExam.questions){
    if(!q.text.trim()){ msgEl.innerHTML = `<div class="msg msg-error">تأكد من كتابة نص جميع الأسئلة</div>`; return; }
    if(q.type==='mcq' && q.options.some(o=>!o.trim())){ msgEl.innerHTML = `<div class="msg msg-error">تأكد من تعبئة جميع خيارات أسئلة الاختيار من متعدد</div>`; return; }
  }
  msgEl.innerHTML = `<div class="msg msg-success">جارٍ الحفظ...</div>`;
  const saveBtn = event && event.target ? event.target : null;
  if(saveBtn) saveBtn.disabled = true;
  try{
    const exams = await loadExams();
    let code = draftExam.code.trim().toUpperCase();
    if(code){
      if(exams.some(e=>e.code===code)){ msgEl.innerHTML = `<div class="msg msg-error">هذا الرمز مستخدم مسبقًا، اختر رمزًا آخر</div>`; if(saveBtn) saveBtn.disabled=false; return; }
    }else{
      do{ code = genCode(); } while(exams.some(e=>e.code===code));
    }
    const exam = {
      code,
      title: draftExam.title.trim(),
      duration: draftExam.duration,
      expiresAt: draftExam.expiresAt || null,
      questions: draftExam.questions,
      active: true,
      createdAt: new Date().toISOString(),
      totalPoints: draftExam.questions.reduce((s,q)=>s+q.points,0)
    };
    exams.push(exam);
    await saveExams(exams);
    // verify the write actually persisted before telling the admin it worked
    const verify = await loadExams();
    if(!verify.some(e=>e.code===code)){
      throw new Error('verification-failed');
    }
    msgEl.innerHTML = `
      <div class="msg msg-success">
        تم إنشاء الامتحان وحفظه بنجاح! رمز الامتحان الخاص بالطلاب:
        <div style="margin-top:10px;"><span class="code-chip">${code}</span></div>

function toggleReveal(code){ revealedCodes[code] = !revealedCodes[code]; renderExamListTab(document.getElementById('adminTabContent')); }
function copyCode(code){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).catch(()=>{ prompt('انسخ الرمز يدويًا:', code); });
  }else{ prompt('انسخ الرمز يدويًا:', code); }
}
async function toggleExamActive(code){
  const exams = await loadExams();
  const ex = exams.find(e=>e.code===code);
  if(ex) ex.active = !ex.active;
  await saveExams(exams);
  renderExamListTab(document.getElementById('adminTabContent'));
}
async function deleteExam(code){
  if(!confirm('هل أنت متأكد من حذف هذا الامتحان؟ سيتم حذف جميع النتائج المرتبطة به.')) return;
  let exams = await loadExams();
  exams = exams.filter(e=>e.code!==code);
  await saveExams(exams);
  let subs = await loadSubs();
  subs = subs.filter(s=>s.examCode!==code);
  await saveSubs(subs);
  renderExamListTab(document.getElementById('adminTabContent'));
}

async function getStudentExamResults(s){
  const subs = await loadSubs();
  const exams = await loadExams();
  const code = (s.code||'').trim().toUpperCase();
  const mine = subs.filter(x => (x.studentCode||'').trim().toUpperCase() === code);
  return mine.map(sub=>{
    const exam = exams.find(e=>e.code===sub.examCode);
    if(!exam) return null;
    const pct = exam.totalPoints ? Math.round(100*sub.score/exam.totalPoints) : 0;
    return { title: exam.title, score: sub.score, total: exam.totalPoints, pct, graded: sub.graded, submittedAt: sub.submittedAt };
  }).filter(Boolean).sort((a,b)=> new Date(a.submittedAt) - new Date(b.submittedAt));
}
function buildParentMessageText(s, results){
  const graded = results.filter(r=>r.graded);
  const avgPct = graded.length ? Math.round(graded.reduce((sum,r)=>sum+r.pct,0)/graded.length) : null;

  let perf;
  if(avgPct===null){
    perf = 'لم تتوفر بعد نتائج مصحَّحة بالكامل لعرض تقييم شامل، سنوافيكم بها فور اكتمال التصحيح.';
  }else if(avgPct>=85){
    perf = `مستوى ممتاز بمعدل عام ${avgPct}%. نشكر جهد الطالب/ـة ونشجّع على المحافظة على هذا التميز.`;
  }else if(avgPct>=70){
    perf = `مستوى جيد جدًا بمعدل عام ${avgPct}%، مع وجود مجال للتحسّن بمزيد من المتابعة والمراجعة.`;
  }else if(avgPct>=50){
    perf = `مستوى متوسط بمعدل عام ${avgPct}%، ويحتاج الطالب/ـة إلى مزيد من الاهتمام والمتابعة الدراسية في المنزل.`;
  }else{
    perf = `المعدل العام حاليًا ${avgPct}%، وهذا يستدعي متابعة عاجلة وأقرب من قِبَلكم بالتنسيق مع المدرّس لدعم الطالب/ـة.`;
  }

  const examsListText = results.length
    ? results.map(r=>`• ${r.title}: ${r.graded ? `${r.score}/${r.total} (${r.pct}%)` : 'قيد التصحيح'}`).join('\n')
    : 'لا توجد نتائج امتحانات مسجّلة بعد.';

  return `السلام عليكم ورحمة الله وبركاته 🌷

ولي أمر الطالب/ـة ${s.name || ''} المحترم/ـة،

نتشرف بالتواصل معكم من "منصة الامتحانات الإلكترونية" لإطلاعكم على معلومات ونتائج ابنكم/ابنتكم الدراسية:

👤 الاسم: ${s.name || '—'}
🏫 المستوى الدراسي: ${s.class || '—'}
📚 الشعبة: ${s.section || '—'}

📊 نتائج الامتحانات:
${examsListText}

📈 التقييم العام: ${perf}

💡 إرشادات لمتابعة الطالب/ـة في المنزل:
• تخصيص وقت يومي ثابت وهادئ للمذاكرة ومراجعة الدروس.
• متابعة حل الواجبات والمسائل أولًا بأول دون تأجيل.
• التواصل مع المدرّس فور ملاحظة أي تراجع أو صعوبة في مادة معينة.
• تحفيز الطالب/ـة معنويًا والاحتفاء بأي تحسّن ولو كان بسيطًا.
• متابعة نتائجه بشكل دوري عبر المنصة والاطمئنان على مستواه أولًا بأول.

شاكرين لكم حسن تعاونكم ومتابعتكم المستمرة، ونحن بانتظار ملاحظاتكم في أي وقت.
مع تحيات فريق المنصة 🌟`;
}

function sendParentWhatsApp(studentId){

  const phone = (phoneInp ? phoneInp.value : '').replace(/[^0-9]/g,'');

function copyParentMessageText(studentId){

              ${q.options.map((opt,i)=>`
                <div class="opt-row ${i===q.correctIndex?'correct':''} ${i===ans && !correct?'wrong':''}">
                  ${escapeHtml(opt)} ${i===ans?'← إجابة الطالب':''} ${i===q.correctIndex?'✓ الصحيحة':''}
                </div>
              `).join('')}
              <p style="font-size:.85rem; color:${correct?'var(--good)':'var(--bad)'}; font-weight:700;">${correct?'إجابة صحيحة':'إجابة خاطئة'} — تُصحَّح تلقائيًا</p>
            </div>
          `;
        }else{
          const suggestion = suggestScore(ans, q.modelAnswer, q.points);
          const ansFile = sub.answerFiles ? sub.answerFiles[q.id] : '';
          return `
            <div class="qcard">
              <span class="qnum">سؤال ${idx+1} (${q.points} درجة)</span>
              <p style="margin-top:14px;"><b>${escapeHtml(q.text)}</b></p>
              ${(q.qImage || q.qFileLink) ? `<div style="margin-bottom:10px;">${fileButtonHTML('مرفق السؤال', q.qFileLink, q.qImage)}</div>` : ''}
              <div style="background:rgba(0,0,0,.2); border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:10px; white-space:pre-wrap;">${escapeHtml(ans || '(لم يُجب)')}</div>
              ${ansFile ? `<div style="margin-bottom:10px;">${fileButtonHTML('مرفق إجابة الطالب', '', ansFile)}</div>` : ''}
              ${q.modelAnswer ? `<p style="font-size:.78rem; color:var(--text-dim);">الإجابة النموذجية: ${escapeHtml(q.modelAnswer)}</p>` : ''}
              ${(q.modelAnswerImage || q.modelAnswerFileLink) ? `<div style="margin-bottom:10px;">${fileButtonHTML('مرفق الإجابة النموذجية', q.modelAnswerFileLink, q.modelAnswerImage)}</div>` : ''}
              <label>الدرجة الممنوحة (من ${q.points})</label>
              <div class="row" style="align-items:center;">
                <input type="number" id="grade_${q.id}" min="0" max="${q.points}" value="${sub.manualGrades && sub.manualGrades[q.id]!==undefined ? sub.manualGrades[q.id] : ''}" placeholder="0 - ${q.points}">
                ${suggestion!==null ? `<button type="button" class="btn btn-outline btn-sm" style="flex:0;" onclick="document.getElementById('grade_${q.id}').value=${suggestion}">استخدام اقتراح النظام: ${suggestion}</button>` : ''}
              </div>
            </div>
          `;
        }
      }).join('')}
      <button class="btn btn-primary" onclick="saveGrading('${sub.id}')">حفظ التصحيح</button>
      <div id="gradeMsg"></div>
    </div>
  `;
}
async function saveGrading(subId){
  const subs = await loadSubs();
  const sub = subs.find(s=>s.id===subId);
  const exams = await loadExams();
  const exam = exams.find(e=>e.code===sub.examCode);
  if(!sub.manualGrades) sub.manualGrades = {};
  let totalScore = 0, allGraded = true;
  for(const q of exam.questions){
    if(q.type==='mcq'){
      totalScore += (sub.answers[q.id]===q.correctIndex) ? q.points : 0;
    }else{
      const input = document.getElementById(`grade_${q.id}`);
      const val = input ? parseFloat(input.value) : NaN;
      if(isNaN(val)){ allGraded = false; }
      else{ sub.manualGrades[q.id] = Math.max(0, Math.min(q.points, val)); totalScore += sub.manualGrades[q.id]; }
    }
  }
  sub.score = totalScore; sub.graded = allGraded;
  await saveSubs(subs);
  document.getElementById('gradeMsg').innerHTML = `<div class="msg msg-success">تم حفظ التصحيح بنجاح</div>`;
  setTimeout(()=> renderResultsTab(document.getElementById('adminTabContent')), 1000);
}

  if(!state.examAnswerFiles) state.examAnswerFiles = {};
  exam.questions.forEach(q => {
    const wrap = document.getElementById(`qanswer_${q.id}`);
    if(q.type==='mcq'){
      wrap.innerHTML = q.options.map((opt,i)=>`
        <div class="opt-row" id="optrow_${q.id}_${i}" onclick="selectOption('${q.id}', ${i})">
          <input type="radio" name="ans_${q.id}" ${state.examAnswers[q.id]===i?'checked':''} readonly>
          <span>${escapeHtml(opt)}</span>
        </div>
      `).join('');
    }else{
      wrap.innerHTML = `
        <textarea id="essay_${q.id}" rows="4" placeholder="اكتب إجابتك هنا">${escapeHtml(state.examAnswers[q.id]||'')}</textarea>
        <label class="btn btn-outline btn-sm" style="cursor:pointer; display:inline-block;">📎 إرفاق صورة أو ملف لحلّك (اختياري)
          <input type="file" accept="${ATTACH_ACCEPT}" id="essayFile_${q.id}" style="display:none;">
        </label>
        <span id="essayFileName_${q.id}" style="font-size:.72rem; color:var(--text-dim); margin-right:8px;"></span>
        <div id="essayFilePreview_${q.id}" style="margin-top:8px;">${state.examAnswerFiles[q.id] ? `<p style="font-size:.75rem; color:var(--good);">✓ تم إرفاق ملف &nbsp;<button type="button" class="link-btn" style="color:var(--bad);" onclick="clearEssayAnswerFile('${q.id}')">إزالة</button></p>` : ''}</div>
      `;
      const ta = document.getElementById(`essay_${q.id}`);
      ta.addEventListener('input', e => { state.examAnswers[q.id] = e.target.value; });
      const fileInp = document.getElementById(`essayFile_${q.id}`);
      fileInp.addEventListener('change', async e => {
        const file = e.target.files[0];
        if(!file) return;
        if(file.size > 3*1024*1024){ alert('حجم الملف كبير جدًا، الرجاء اختيار ملف أصغر من 3 ميغابايت.'); return; }
        document.getElementById(`essayFileName_${q.id}`).textContent = 'جارٍ الرفع: ' + file.name;
        state.examAnswerFiles[q.id] = await readFileAsDataURL(file);
        document.getElementById(`essayFileName_${q.id}`).textContent = '';
        document.getElementById(`essayFilePreview_${q.id}`).innerHTML = `<p style="font-size:.75rem; color:var(--good);">✓ تم إرفاق ملف &nbsp;<button type="button" class="link-btn" style="color:var(--bad);" onclick="clearEssayAnswerFile('${q.id}')">إزالة</button></p>`;
      });
    }
  });
  startTimer();
}
function clearEssayAnswerFile(qid){
  if(state.examAnswerFiles) delete state.examAnswerFiles[qid];
  const el = document.getElementById(`essayFilePreview_${qid}`);
  if(el) el.innerHTML = '';
}
function selectOption(qid, idx){
  state.examAnswers[qid] = idx;
  const exam = state.currentExam;
  const q = exam.questions.find(x=>x.id===qid);
  q.options.forEach((_, i) => {
    const row = document.getElementById(`optrow_${qid}_${i}`);
    const radio = row.querySelector('input[type=radio]');
    if(i===idx){ row.classList.add('selected'); radio.checked = true; }
    else{ row.classList.remove('selected'); radio.checked = false; }
  });
}
function startTimer(){
  clearTimerInterval();
  updateTimerDisplay();
  state.timerInterval = setInterval(()=>{
    state.timeLeft--;
    updateTimerDisplay();
    if(state.timeLeft<=0){ clearTimerInterval(); submitExam(true); }
  }, 1000);
}
function updateTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  if(!el) return;
  const m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if(state.timeLeft <= 60) bar.classList.add('warn'); else bar.classList.remove('warn');
}
function confirmSubmitExam(){
  const exam = state.currentExam;
  const unanswered = exam.questions.filter(q => state.examAnswers[q.id]===undefined || state.examAnswers[q.id]==='').length;
  const msg = unanswered>0 ? `لديك ${unanswered} سؤال بدون إجابة. هل تريد التسليم الآن؟` : 'هل أنت متأكد من تسليم الامتحان؟';
  if(confirm(msg)) submitExam(false);
}
async function submitExam(auto){
  clearTimerInterval();
  const exam = state.currentExam;
  let score = 0, hasEssay = false;
  exam.questions.forEach(q => {
    if(q.type==='mcq'){ if(state.examAnswers[q.id]===q.correctIndex) score += q.points; }
    else{ hasEssay = true; }
  });
  const sub = {
    id: state.studentId, examCode: exam.code, studentName: state.studentName,
    studentClass: state.studentClass, studentSection: state.studentSection, studentCode: state.studentCode || '',
    answers: state.examAnswers, answerFiles: state.examAnswerFiles || {}, submittedAt: new Date().toISOString(),
    score, graded: !hasEssay, manualGrades: {}
  };
  const subs = await loadSubs();
  subs.push(sub);
  await saveSubs(subs);
  state.lastSubmission = sub;
  state.view = 'studentResult';
  render();
}

/* ============================= STUDENT: RESULT ============================= */

    <div class="panel celebrate" style="max-width:480px; margin:20px auto; text-align:center;">
      <span style="font-size:2.6rem;">🎉</span>
      <h3 class="display">تم تسليم الامتحان بنجاح</h3>
      <p style="color:var(--text-dim);">${escapeHtml(state.studentName)}، شكرًا لإكمال "${escapeHtml(exam.title)}".</p>
      ${sub.graded ? `
        <div style="margin:20px 0;">
          <div class="score-big">${sub.score} / ${exam.totalPoints}</div>
          <div class="score-sub">درجتك النهائية</div>
        </div>
      ` : `
        <div class="msg msg-success" style="margin-top:16px;">
          تم تصحيح الأسئلة ذات الاختيار من متعدد تلقائيًا. الأسئلة المقالية بانتظار تصحيح المدرّس.
          يمكنك تتبّع نتيجتك النهائية لاحقًا باستخدام رمز الامتحان واسمك.

    ${quoteCardHTML()}

function toggleResultDiagnosis(){
  const el = document.getElementById('resultDiagnosis');
  if(el.innerHTML.trim()){ el.innerHTML = ''; return; }
  el.innerHTML = buildDiagnosisHTML(state.lastSubmission, state.currentExam);
}

/* ============================= SHARED: ANSWER DIAGNOSIS ============================= */
function buildDiagnosisHTML(sub, exam){
  return exam.questions.map((q,idx) => {
    const ans = sub.answers[q.id];
    if(q.type==='mcq'){
      const correct = ans===q.correctIndex;
      return `
        <div class="qcard">
          <span class="qnum">سؤال ${idx+1}</span>
          <p style="margin-top:14px; font-weight:600;">${escapeHtml(q.text)}</p>
          ${(q.qImage || q.qFileLink) ? `<div style="margin-bottom:10px;">${fileButtonHTML('مرفق السؤال', q.qFileLink, q.qImage)}</div>` : ''}
          <div class="opt-row ${correct?'correct':'wrong'}">
            إجابتك: ${ans!==undefined && ans!==null ? escapeHtml(q.options[ans]) : '(بدون إجابة)'} ${correct?'✓':'✗'}
          </div>
          ${!correct ? `<div class="opt-row correct">الإجابة الصحيحة: ${escapeHtml(q.options[q.correctIndex])}</div>` : ''}
        </div>
      `;
    }else{
      const grade = (sub.manualGrades && sub.manualGrades[q.id]!==undefined) ? sub.manualGrades[q.id] : null;
      const ansFile = sub.answerFiles ? sub.answerFiles[q.id] : '';
      return `
        <div class="qcard">
          <span class="qnum">سؤال ${idx+1}</span>
          <p style="margin-top:14px; font-weight:600;">${escapeHtml(q.text)}</p>
          ${(q.qImage || q.qFileLink) ? `<div style="margin-bottom:10px;">${fileButtonHTML('مرفق السؤال', q.qFileLink, q.qImage)}</div>` : ''}
          <div style="background:rgba(0,0,0,.2); border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:8px; white-space:pre-wrap;">إجابتك: ${escapeHtml(ans || '(لم يُجب)')}</div>
          ${ansFile ? `<div style="margin-bottom:8px;">${fileButtonHTML('مرفقك مع الإجابة', '', ansFile)}</div>` : ''}
          ${grade!==null ? `<p style="font-size:.85rem; color:var(--text-dim);">الدرجة: ${grade} / ${q.points}</p>` : `<p style="font-size:.85rem; color:var(--primary-2);">بانتظار تصحيح المدرّس</p>`}
          ${q.modelAnswer ? `<p style="font-size:.78rem; color:var(--text-dim);">🩺 تشخيص: قارن إجابتك بالإجابة النموذجية — "${escapeHtml(q.modelAnswer)}"</p>` : ''}
          ${(q.modelAnswerImage || q.modelAnswerFileLink) ? `<div style="margin-bottom:8px;">${fileButtonHTML('مرفق الإجابة النموذجية', q.modelAnswerFileLink, q.modelAnswerImage)}</div>` : ''}
        </div>
      `;
    }
  }).join('');
}

/* ============================= STUDENT: STUDY LIBRARY ============================= */
function fileButtonHTML(label, link, fileData){
  if(fileData){
    if(fileData.startsWith('data:image/')){
      return `
        <p style="font-size:.82rem; color:var(--text-dim); margin-bottom:6px;">${label}</p>
        <img src="${fileData}" style="max-width:100%; border-radius:8px; border:1px solid var(--line); cursor:zoom-in;" onclick="this.style.maxWidth = this.style.maxWidth==='none' ? '100%' : 'none'">
      `;
    }
    return `
      <p style="font-size:.82rem; color:var(--text-dim); margin-bottom:6px;">${label}</p>
      <a class="btn btn-outline btn-sm" href="${fileData}" download target="_blank" rel="noopener">📎 تحميل / فتح الملف</a>
    `;
  }
  if(link){
    return `<a class="btn btn-outline btn-sm" href="${escapeHtml(link)}" target="_blank" rel="noopener">📎 ${label}</a>`;
  }
  return `<p style="font-size:.78rem; color:var(--text-dim);">${label}: لم يُضف بعد</p>`;
}
function attachmentFieldHTML(idPrefix, label, linkVal, fileVal, accept, clearCallExpr){
  return `
    <div class="panel" style="background:rgba(0,0,0,.15); margin-bottom:10px;">
      <label>${label}</label>
      <input type="text" id="${idPrefix}_link" value="${escapeHtml(linkVal||'')}" placeholder="رابط خارجي (اختياري)">
      <label class="btn btn-outline btn-sm" style="cursor:pointer; display:inline-block;">📎 اختر صورة أو ملف من الجهاز
        <input type="file" accept="${accept}" id="${idPrefix}_file" style="display:none;">
      </label>
      <span id="${idPrefix}_filename" style="font-size:.72rem; color:var(--text-dim); margin-right:8px;"></span>
      ${fileVal ? `<p style="font-size:.75rem; color:var(--good); margin-top:8px;">✓ يوجد ملف مرفق &nbsp;<button type="button" class="link-btn" style="color:var(--bad);" onclick="${clearCallExpr}">إزالة</button></p>` : ''}
    </div>
  `;
}
const ATTACH_ACCEPT = 'image/*,.pdf,.doc,.docx,.ppt,.pptx';

}
function openLibraryGrade(gk){ state.currentLibraryGrade = gk; state.view = 'libraryGrade'; render(); }

/* ============================= STUDENT: MY GRADES (across all exams) ============================= */
function renderMyGrades(){
  appEl.innerHTML = `
    <button class="back-btn" onclick="goHome()">→ رجوع للرئيسية</button>
    ${quoteCardHTML()}
    <div class="panel" style="max-width:460px; margin:0 auto 18px;">
      <h3 class="display">درجاتي</h3>
      <div id="mgMsg"></div>
      <label>كودك الشخصي (الأدق، إن وُجد)</label>
      <input type="text" id="mgCode" style="text-transform:uppercase;" placeholder="مثال: A1B2C3">
      <p style="text-align:center; color:var(--text-dim); font-size:.78rem; margin:-6px 0 14px;">— أو ابحث بالاسم —</p>
      <label>الاسم الكامل</label>
      <input type="text" id="mgName">
      <div class="row">
        <div><label>الصف</label><input type="text" id="mgClass" placeholder="اختياري"></div>
        <div><label>الشعبة</label><input type="text" id="mgSection" placeholder="اختياري"></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doMyGradesSearch()">عرض درجاتي</button>
    </div>
    <div id="mgResults"></div>
  `;
  document.getElementById('mgCode').addEventListener('input', e=>{ e.target.value = e.target.value.toUpperCase(); });
}
async function doMyGradesSearch(){
  const code = document.getElementById('mgCode').value.trim().toUpperCase();
  const name = document.getElementById('mgName').value.trim();
  const cls = document.getElementById('mgClass').value.trim();
  const sec = document.getElementById('mgSection').value.trim();
  const msgEl = document.getElementById('mgMsg');
  if(!code && !name){ msgEl.innerHTML = `<div class="msg msg-error">أدخل كودك أو اسمك للبحث عن درجاتك</div>`; return; }
  const subs = await loadSubs();
  let matches;
  if(code){
    matches = subs.filter(s => (s.studentCode||'').trim().toUpperCase() === code);
  }else{
    matches = subs.filter(s =>
      s.studentName.trim().toLowerCase() === name.toLowerCase() &&
      (!cls || (s.studentClass||'').trim().toLowerCase() === cls.toLowerCase()) &&
      (!sec || (s.studentSection||'').trim().toLowerCase() === sec.toLowerCase())
    );
  }
  if(matches.length===0){ msgEl.innerHTML = `<div class="msg msg-error">لم يتم العثور على أي نتائج مطابقة لهذه البيانات</div>`; document.getElementById('mgResults').innerHTML=''; return; }
  msgEl.innerHTML = '';
  const exams = await loadExams();
  state.mgMatches = matches.map(s => ({ sub: s, exam: exams.find(e=>e.code===s.examCode) })).filter(x=>x.exam);
  renderMyGradesResults();
}
function renderMyGradesResults(){
  const data = state.mgMatches || [];
  const el = document.getElementById('mgResults');
  el.innerHTML = `
    <div class="panel">
      <table>
        <thead><tr><th>الامتحان</th><th>التاريخ</th><th>الدرجة</th><th>الحالة</th><th></th></tr></thead>
        <tbody>
          ${data.map((d,i) => `
            <tr>
              <td>${escapeHtml(d.exam.title)}</td>
              <td>${new Date(d.sub.submittedAt).toLocaleDateString('ar-EG')}</td>
              <td>${d.sub.score} / ${d.exam.totalPoints}</td>
              <td><span class="badge ${d.sub.graded?'badge-active':'badge-pending'}">${d.sub.graded?'مكتمل':'قيد التصحيح'}</span></td>
              <td><button class="link-btn" onclick="toggleMgDetail(${i})">التشخيص التفصيلي</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div id="mgDetailPanel"></div>
  `;
}
function toggleMgDetail(i){
  const d = state.mgMatches[i];
  document.getElementById('mgDetailPanel').innerHTML = `
    <div class="panel">
      <h3 class="display">تشخيص إجاباتك: ${escapeHtml(d.exam.title)}</h3>
      ${buildDiagnosisHTML(d.sub, d.exam)}
    </div>
  `;
  document.getElementById('mgDetailPanel').scrollIntoView({behavior:'smooth', block:'start'});
}

    document.body.insertAdjacentHTML('afterbegin', `

        ⚠️ تعذّر الاتصال بقاعدة بيانات Firebase.
        <div style="font-weight:400; font-size:.72rem; margin-top:4px; direction:ltr; word-break:break-word;">${(health.error||'').replace(/</g,'&lt;')}</div>
      </div>
    `);
  }
  const theme = await loadTheme();
  applyTheme(theme);
  telegramLink = await loadTelegramLink();
  updateHeaderTelegramButton();
  render();
})();
</script>
